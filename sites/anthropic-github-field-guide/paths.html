<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ロードマップ / Roadmap — 目的別の学習順｜Field Guide</title>
<meta name="description" content="何から手をつけるか。7つの実務シナリオごとに、どのリポジトリをどの順で学ぶかを示すロードマップ。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="site-header"></div>

<main>
  <section class="kicker-page">
    <div class="wrap">
      <div class="crumbs reveal"><a href="index.html">ホーム</a><span>/</span>ロードマップ</div>
      <span class="eyebrow reveal" style="margin-top:1em">Roadmap</span>
      <h1 class="reveal">目的別ロードマップ<span class="en">Where to start, step by step</span></h1>
      <p class="lede reveal">「結局、何から手をつければいいの？」に答える7本。自分の立場・ゴールに近いものを選び、上から順にたどってください。各ステップは<b>なぜそれをやるか</b>付き。</p>
      <div class="filters reveal" id="path-nav" style="margin-top:22px"></div>
    </div>
  </section>

  <section class="section" style="padding-top:clamp(20px,3vw,40px)">
    <div class="wrap" id="paths-wrap"></div>
  </section>
</main>

<div id="site-footer"></div>
<script src="data.js"></script>
<script src="site.js"></script>
<script>
(function(){
  const {PATHS}=window.GUIDE;
  const U=window.GUIDE_UTIL;
  const wrap=document.getElementById('paths-wrap');
  const nav=document.getElementById('path-nav');

  PATHS.forEach(p=>{
    nav.appendChild(U.el(`<a class="chip" href="#${p.id}">${p.num} ${U.esc(p.title)}</a>`));

    const steps=p.steps.map((st,i)=>{
      const r=U.REPO_BY_NAME[st.repo];
      const stars=r?`<span class="star">★ ${U.fmtStars(r.s)}</span>`:'';
      const link=`<a href="${U.repoUrl(st.repo)}" target="_blank" rel="noopener">${U.esc(st.repo)}</a>`;
      const lvl=r?`<span class="lvl lvl-${r.v}" style="margin-left:.4em">${r.v}</span>`:'';
      return `
        <div class="step">
          <div class="idx">${i+1}</div>
          <div class="body">
            <div class="rn">${link} ${lvl} ${stars}</div>
            <div class="why">${U.esc(st.why)}</div>
          </div>
        </div>`;
    }).join('');

    wrap.appendChild(U.el(`
      <div class="path reveal" id="${p.id}">
        <div class="path-head">
          <div class="num">${p.num}</div>
          <h3>${U.esc(p.title)}</h3>
          <span class="aud">${U.esc(p.audience)}</span>
          <p class="goal">${U.esc(p.goal)}</p>
        </div>
        <div class="steps">${steps}</div>
      </div>`));
  });

  U.observe(document);
})();
</script>
</body>
</html>
