<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: #FAF9F7; color: #1B1B1B;
    font-family: "Noto Sans JP","Hiragino Kaku Gothic ProN",system-ui,sans-serif;
    padding: 90px 100px; position: relative;
    display: flex; flex-direction: column; justify-content: center;
  }
  body::before { content: ""; position: absolute; left: 100px; top: 72px; width: 64px; height: 4px; background: #FF5C1A; border-radius: 2px; }
  .brand { font-size: 30px; font-weight: 600; letter-spacing: -0.01em; }
  .brand .dot { color: #FF5C1A; }
  .title { font-size: 92px; font-weight: 700; letter-spacing: 0.04em; line-height: 1.1; margin-top: 28px; }
  .title .dot { color: #FF5C1A; }
  .sub { font-size: 36px; font-weight: 500; margin-top: 24px; }
  .meta { font-size: 20px; color: #767676; letter-spacing: 0.04em; margin-top: 16px; }
  .dots { display: flex; gap: 26px; margin-top: 52px; align-items: center; }
  .dots svg { width: 58px; height: 58px; display: block; }
</style>
</head>
<body>
  <div class="brand">UT<span class="dot">.</span></div>
  <div class="title">ひとりの会社<span class="dot">。</span></div>
  <div class="sub">司令塔と、AIの社員たち。</div>
  <div class="meta">少なく、よく。 — Digital Generalist, Tokyo</div>
  <div class="dots" aria-hidden="true">
    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><circle cx="32" cy="32" r="28" fill="#FF5C1A"/></svg>
    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><circle cx="32" cy="32" r="28" fill="#FF5C1A"/><rect x="21" y="21" width="22" height="22" rx="4" fill="#fff"/></svg>
    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><circle cx="32" cy="32" r="28" fill="#FF5C1A"/><path d="M32 17 L46 45 L18 45 Z" fill="#fff"/></svg>
    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><circle cx="32" cy="32" r="28" fill="#FF5C1A"/><path d="M19 33 L28 42 L46 22" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><circle cx="32" cy="32" r="28" fill="#FF5C1A"/><circle cx="32" cy="32" r="11" fill="none" stroke="#fff" stroke-width="5"/></svg>
  </div>
</body>
</html>
