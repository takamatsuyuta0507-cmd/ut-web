<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Focus</title>
  <meta name="description" content="1つのことに集中するための、シンプルなタイマー。" />

  <!-- PWA -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#FAF9F7" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Focus" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <span class="wordmark" id="wordmark" aria-label="brand"></span>
      <span class="appname">Focus</span>
    </header>

    <section class="stage" aria-live="polite">
      <div class="dial">
        <svg class="ring" viewBox="0 0 240 240" role="img" aria-label="残り時間">
          <circle class="ring-track" cx="120" cy="120" r="104" />
          <circle class="ring-fill" id="ringFill" cx="120" cy="120" r="104" />
        </svg>
        <div class="readout">
          <div class="time" id="time">25:00</div>
          <div class="state" id="stateLabel">集中する準備はいい？</div>
        </div>
      </div>

      <div class="presets" id="presets" role="group" aria-label="時間を選ぶ">
        <button class="chip" data-min="5">5</button>
        <button class="chip" data-min="15">15</button>
        <button class="chip is-active" data-min="25">25</button>
        <button class="chip" data-min="50">50</button>
      </div>
    </section>

    <footer class="controls">
      <button class="btn-reset" id="reset" aria-label="リセット">リセット</button>
      <button class="btn-primary" id="toggle">スタート</button>
      <span class="spacer" aria-hidden="true"></span>
    </footer>

    <p class="credit">by UT.</p>
  </main>

  <script src="./app.js"></script>
</body>
</html>
