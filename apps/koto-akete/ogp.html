<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: #FAF9F7; color: #1B1B1B;
    font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", system-ui, sans-serif;
    display: flex; align-items: center; justify-content: space-between;
    padding: 92px 100px; position: relative;
  }
  body::before { /* faint top hairline accent */
    content: ""; position: absolute; left: 100px; top: 70px; width: 64px; height: 4px;
    background: #FF5C1A; border-radius: 2px;
  }
  .left { max-width: 640px; }
  .brand { font-size: 30px; font-weight: 600; letter-spacing: -0.01em; }
  .brand .dot { color: #FF5C1A; }
  .title { font-size: 104px; font-weight: 700; letter-spacing: 0.05em; line-height: 1.05; margin-top: 34px; }
  .tagline { font-size: 35px; font-weight: 500; line-height: 1.5; margin-top: 30px; }
  .by { font-size: 20px; color: #767676; letter-spacing: 0.06em; margin-top: 50px; }

  .art { position: relative; width: 320px; height: 320px; flex: none; }
  .env { position: absolute; inset: 36px; border: 3px solid #DAD4C9; border-radius: 20px; background: #FFFFFF; }
  .flap { position: absolute; inset: 0; }
  .seal {
    position: absolute; width: 70px; height: 70px; border-radius: 50%; background: #FF5C1A;
    left: 50%; top: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 0 16px #FFF1EA;
  }
</style>
</head>
<body>
  <div class="left">
    <div class="brand">koto<span class="dot">.</span></div>
    <div class="title">あけてね</div>
    <div class="tagline">そのときに、開けてほしい手紙を。</div>
    <div class="by">a koto app by UT.</div>
  </div>
  <div class="art">
    <div class="env"></div>
    <svg class="flap" width="320" height="320" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
      <path d="M70 104 L160 176 L250 104" fill="none" stroke="#DAD4C9" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
    <div class="seal"></div>
  </div>
</body>
</html>
