<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Praise</title>
  <meta name="description" content="ボタンを押すと、やたら細かいことを大げさにほめてくれる。" />

  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#FAF9F7" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Praise" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <span class="wordmark js-brand"></span>
      <span class="appname">PRAISE</span>
    </header>

    <section class="stage">
      <p class="count" id="count" hidden>今日 <b id="countNum">0</b> 回ほめられた</p>
      <div class="praise" id="praise">
        <span class="q">「</span><span id="ptext">ボタンを押すと、やたら細かくほめてくれます。</span><span class="q">」</span>
      </div>
    </section>

    <footer class="controls">
      <button class="btn-praise" id="praiseBtn">ほめて</button>
    </footer>

    <footer class="credit">
      <span>by UT.</span>
      <span class="sep">·</span>
      <a id="supportLink" target="_blank" rel="noopener">☕ 応援する</a>
      <span class="sep">·</span>
      <a id="noteLink" target="_blank" rel="noopener">制作ノート</a>
    </footer>
  </main>

  <script src="./app.js"></script>
</body>
</html>
