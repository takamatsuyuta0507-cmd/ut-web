<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; box-sizing: border-box; }
  :root {
    --bg: #FCFAF7;
    --ink: #211D18;
    --sub: #6B6259;
    --orange: #E8590C;
    --line: #E8E1D6;
  }
  html, body { width: 1500px; height: 500px; }
  body {
    background: var(--bg);
    font-family: "Noto Sans JP", sans-serif;
    color: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    -webkit-font-smoothing: antialiased;
  }
  /* subtle corner accents */
  body::before, body::after {
    content: "";
    position: absolute;
    width: 70px; height: 70px;
    border: 2px solid var(--orange);
    opacity: 0.5;
  }
  body::before { top: 54px; left: 54px; border-right: none; border-bottom: none; }
  body::after  { bottom: 54px; right: 54px; border-left: none; border-top: none; }

  .eyebrow {
    display: flex; align-items: center; gap: 16px;
    font-size: 19px; letter-spacing: 0.34em; color: var(--orange);
    font-weight: 500; margin-bottom: 24px;
  }
  .eyebrow::before, .eyebrow::after {
    content: ""; width: 38px; height: 2px; background: var(--orange); display: inline-block;
  }
  .wordmark {
    font-size: 156px; font-weight: 700; letter-spacing: -0.01em; line-height: 1;
  }
  .wordmark .dot { color: var(--orange); }
  .tag {
    margin-top: 28px; font-size: 33px; letter-spacing: 0.16em;
    color: var(--ink); font-weight: 500;
  }
  .sub {
    margin-top: 16px; font-size: 19px; letter-spacing: 0.08em; color: var(--sub);
    font-weight: 400;
  }
  .sub .o { color: var(--orange); }
</style>
</head>
<body>
  <p class="eyebrow">DIGITAL GENERALIST &nbsp;/&nbsp; なんでも屋</p>
  <h1 class="wordmark">UT<span class="dot">.</span></h1>
  <p class="tag">つくる・なおす・つなぐ<span style="color:var(--orange)">。</span></p>
  <p class="sub">koto<span class="o">.</span> &nbsp;— 1つのことだけ、きれいに片づくアプリ。</p>
</body>
</html>
